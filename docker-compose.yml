version: "3.8"

services:
  bot:
    build: .
    image: trading_system_pro:latest
    container_name: trading_bot
    env_file: .env
    environment:
      - TRADING_MODE=paper
    volumes:
      - ./logs:/app/logs
      - ./portfolio:/app/portfolio
      - ./signals:/app/signals
    restart: unless-stopped
    # Optional: run dashboard in same container or separate
    # command: ["python", "main.py", "--symbol", "BTCUSDT", "--mode", "monitor"]

  dashboard:
    build: .
    image: trading_system_pro:latest
    container_name: trading_dashboard
    env_file: .env
    command: ["streamlit", "run", "streamlit_dashboard.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./portfolio:/app/portfolio
    restart: unless-stopped
    depends_on:
      - bot

volumes:
  logs:
  portfolio:
